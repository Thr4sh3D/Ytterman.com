# Netlify configuration file for ytterman.com

[build]
  publish = "dist"
  command = "npm run build"

# Build settings
[build.environment]
  NODE_VERSION = "20"

# Redirect rules for URL canonicalization
# Order matters: most specific first

# Redirect http://www to https (no www)
[[redirects]]
  from = "http://www.ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

# Redirect http to https  
[[redirects]]
  from = "http://ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

# Redirect https://www to https (no www)
[[redirects]]
  from = "https://www.ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Help search engines understand canonical URLs
    Link = '<https://ytterman.com>; rel="canonical"'

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
