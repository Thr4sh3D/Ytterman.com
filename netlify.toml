# Netlify configuration file for ytterman.com

[build]
  publish = "dist"
  command = "npm run build"

# Redirect rules for URL canonicalization
[[redirects]]
  from = "https://www.ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.ytterman.com/*"
  to = "https://ytterman.com/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
