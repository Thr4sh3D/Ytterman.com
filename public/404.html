<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Prevent indexing of 404 page -->
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Meta refresh for crawlers and browsers without JS (0 second delay) -->
  <meta http-equiv="refresh" content="0;url=/">
  
  <title>Omdirigerar... | Ytterman</title>
  
  <!-- Canonical points to homepage to avoid duplicate content issues -->
  <link rel="canonical" href="https://ytterman.com/">
  
  <script>
    // GitHub Pages SPA redirect script - Enhanced for SEO
    // This script runs immediately to minimize 404 exposure time
    // Dual approach: meta refresh + JS redirect for maximum compatibility
    
    (function() {
      var pathSegmentsToKeep = 0; // 0 for custom domain, 1 for GitHub pages with repo name
      
      var location = window.location;
      var path = location.pathname.slice(1);
      
      // Store the path in sessionStorage so index.html can restore the correct route
      if (path && path !== '404.html') {
        sessionStorage.setItem('spa-redirect-path', '/' + path + location.search + location.hash);
      }
      
      // Immediate redirect to root - React Router will handle the rest
      // Using replace to avoid adding to browser history
      var redirectUrl = location.protocol + '//' + 
        location.hostname + 
        (location.port ? ':' + location.port : '') +
        location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + 
        '/';
      
      // Immediate redirect
      location.replace(redirectUrl);
    })();
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>Omdirigerar...</h1>
  </div>
</body>
</html>
