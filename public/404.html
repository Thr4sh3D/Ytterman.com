<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 
    NOTE: This file is overwritten during build by scripts/copy-404.mjs
    The build process copies dist/index.html to dist/404.html for proper SPA routing on GitHub Pages
    
    This ensures that when GitHub Pages serves 404.html for unknown routes,
    it actually serves the full React app, allowing React Router to handle the routing client-side.
  -->
  
  <!-- Prevent indexing of 404 page -->
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Meta refresh as fallback (in case build script doesn't run) -->
  <meta http-equiv="refresh" content="0;url=/">
  
  <title>Omdirigerar... | Ytterman</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }
  </style>
  
  <script>
    // Fallback redirect script (only used if build script doesn't run)
    (function() {
      var path = window.location.pathname.slice(1);
      if (path && path !== '404.html') {
        sessionStorage.setItem('spa-redirect-path', '/' + path + location.search + location.hash);
      }
      location.replace('/');
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>Omdirigerar...</h1>
  </div>
</body>
</html>
